---
# ============================================================
# Salesforce CI/CD — Production Environment
# Repo  : sfdc-cicd-prod
# Org   : Production (login.salesforce.com)
# Stages: validate → deploy (MANUAL GATE — human approval required)
# ============================================================
#
# Required GitLab CI/CD Variables:
#   SF_PROD_JWT_PRIVATE_KEY  File variable — full PEM content of server.key
#   SF_PROD_CONSUMER_KEY     Variable — Consumer Id from External Client App
#   SF_PROD_USERNAME         Variable — Salesforce integration user username
# ============================================================

image: salesforce/cli:latest-full

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths: [node_modules/]

stages:
  - validate
  - deploy

variables:
  SF_INSTANCE_URL: "https://login.salesforce.com"   # Production org
  ENABLE_SF_DEPLOY: "true"

workflow:
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /(\[skip ci\]|\[ci skip\])/i'
      when: never
    - if: '$ENABLE_SF_DEPLOY != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'

.sf-auth-prod: &sf-auth-prod
  before_script:
    - |
      if [ ! -f "${SF_PROD_JWT_PRIVATE_KEY}" ]; then
        echo "ERROR: SF_PROD_JWT_PRIVATE_KEY must be a GitLab File variable."; exit 1
      fi
      cp "${SF_PROD_JWT_PRIVATE_KEY}" /tmp/server.key
      FIRST_LINE="$(sed -n '1p' /tmp/server.key)"
      if [ "${FIRST_LINE}" != "-----BEGIN PRIVATE KEY-----" ] && \
         [ "${FIRST_LINE}" != "-----BEGIN RSA PRIVATE KEY-----" ]; then
        echo "ERROR: Key is not a valid PEM private key. Got: ${FIRST_LINE}"; exit 1
      fi
      openssl pkey -in /tmp/server.key -noout >/dev/null 2>&1 || { echo "ERROR: Key unreadable."; exit 1; }
    - chmod 600 /tmp/server.key
    - |
      sf org login jwt \
        --client-id    "${SF_PROD_CONSUMER_KEY}" \
        --jwt-key-file /tmp/server.key \
        --username     "${SF_PROD_USERNAME}" \
        --instance-url "${SF_INSTANCE_URL}" \
        --alias        prod \
        --set-default
  after_script:
    - rm -f /tmp/server.key

validate-deploy-prod:
  stage: validate
  <<: *sf-auth-prod
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [force-app/**/*, manifest/**/*, sfdx-project.json]
    - when: never
  script:
    - |
      EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
      if [ -n "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-}" ]; then
        git fetch origin "${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" --depth=50 >/dev/null 2>&1 || true
        DIFF_BASE="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}}"
      else
        DIFF_BASE="${CI_COMMIT_BEFORE_SHA:-${EMPTY_TREE}}"
      fi
      [ -z "${DIFF_BASE}" ] || [ "${DIFF_BASE}" = "0000000000000000000000000000000000000000" ] && DIFF_BASE="${EMPTY_TREE}"

      git diff --name-only --diff-filter=ACMR "${DIFF_BASE}" "${CI_COMMIT_SHA}" \
        -- force-app manifest sfdx-project.json > changed-files.txt || true
      grep -E '^force-app/' changed-files.txt > changed-force-app.txt || true

      if grep -qx 'manifest/package.xml' changed-files.txt; then
        sf project deploy start --dry-run --manifest manifest/package.xml \
          --target-org prod --test-level RunLocalTests --json 2>&1 | tee deploy-validate-result.json
      elif [ -s changed-force-app.txt ]; then
        awk '/^force-app\/main\/default\/(lwc|aura)\// {
          n=split($0,a,"/"); print a[1]"/"a[2]"/"a[3]"/"a[4]"/"a[5]"/"a[6]; next } { print }' \
          changed-force-app.txt | sort -u > changed-dirs.txt
        set -- sf project deploy start --dry-run --target-org prod --test-level RunLocalTests --json
        while IFS= read -r p; do [ -n "${p}" ] && set -- "$@" --source-dir "${p}"; done < changed-dirs.txt
        "$@" 2>&1 | tee deploy-validate-result.json
      else
        echo "No metadata changes — skipping validation."; exit 0
      fi
      STATUS=$(python3 -c "import json; print(json.load(open('deploy-validate-result.json')).get('status',1))")
      [ "${STATUS}" = "0" ] && echo "Validation PASSED" || { echo "Validation FAILED"; exit 1; }
  artifacts:
    when: always
    paths: [deploy-validate-result.json]
    expire_in: 7 days

deploy-to-prod:
  stage: deploy
  <<: *sf-auth-prod
  when: manual          # Human must click Play — pipeline pauses here
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'
      changes: [force-app/**/*, manifest/**/*, sfdx-project.json]
    - when: never
  environment:
    name: production
  script:
    - |
      EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
      DIFF_BASE="${CI_COMMIT_BEFORE_SHA:-${EMPTY_TREE}}"
      [ -z "${DIFF_BASE}" ] || [ "${DIFF_BASE}" = "0000000000000000000000000000000000000000" ] && DIFF_BASE="${EMPTY_TREE}"

      git diff --name-only --diff-filter=ACMR "${DIFF_BASE}" "${CI_COMMIT_SHA}" \
        -- force-app manifest sfdx-project.json > changed-files.txt || true
      grep -E '^force-app/' changed-files.txt > changed-force-app.txt || true

      if grep -qx 'manifest/package.xml' changed-files.txt; then
        sf project deploy start --manifest manifest/package.xml \
          --target-org prod --test-level RunLocalTests --json 2>&1 | tee deploy-result.json
      elif [ -s changed-force-app.txt ]; then
        awk '/^force-app\/main\/default\/(lwc|aura)\// {
          n=split($0,a,"/"); print a[1]"/"a[2]"/"a[3]"/"a[4]"/"a[5]"/"a[6]; next } { print }' \
          changed-force-app.txt | sort -u > changed-dirs.txt
        set -- sf project deploy start --target-org prod --test-level RunLocalTests --json
        while IFS= read -r p; do [ -n "${p}" ] && set -- "$@" --source-dir "${p}"; done < changed-dirs.txt
        "$@" 2>&1 | tee deploy-result.json
      else
        echo "No metadata changes — skipping deploy."; exit 0
      fi
    - |
      python3 - <<'PYEOF'
      import json, sys
      d = json.load(open("deploy-result.json"))
      r = d.get("result", {})
      ok = str(d.get("status", 1)) == "0" and r.get("success", False)
      print(f"Status   : {d.get('status')}")
      print(f"Tests OK : {r.get('numberTestsCompleted', 0)}")
      print(f"Tests ERR: {r.get('numberTestErrors', 0)}")
      sys.exit(0 if ok else 1)
      PYEOF
  artifacts:
    when: always
    paths: [deploy-result.json]
    expire_in: 90 days
